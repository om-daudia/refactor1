spring:
  application:
    name: ${APP_NAME:my-jobworker}
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:}

server:
  port: ${SERVER_PORT:8080}

camunda:
  client:
    mode: ${CAMUNDA_MODE:saas}
    auth:
      client-id: ${CAMUNDA_CLIENT_ID}
      client-secret: ${CAMUNDA_CLIENT_SECRET}
    cluster-id: ${CAMUNDA_CLUSTER_ID}
    region: ${CAMUNDA_REGION}
    zeebe:
      defaults:
        stream-enabled: true

patients:
  api:
    base-url: ${PATIENTS_API_BASE_URL:https://api.capbpm.com}

management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    env:
      show-values: always
    threaddump:
      enabled: true
    heapdump:
      enabled: true
  metrics:
    export:
      simple:
        enabled: true

info:
  app:
    name: My Job Worker
    description: A job worker for processing tasks
    version: 1.0.0
    build:
      timestamp: ${maven.build.timestamp}
