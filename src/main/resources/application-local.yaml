camunda:
  client:
    auth:
      # NOTE: Do not commit real credentials. Use environment variables
      # for local development as well, for example via a .env file or
      # your IDE run configuration.
      client-id: ${CAMUNDA_CLIENT_ID}
      client-secret: ${CAMUNDA_CLIENT_SECRET}
    cluster-id: ${CAMUNDA_CLUSTER_ID}
    region: ${CAMUNDA_REGION}